name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  posix:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
          - os: ubuntu-latest
            cc: clang
          - os: macos-latest
            cc: clang
    env:
      # Wrap the compiler with sccache so per-.o compiles are cached
      # across runs via the GitHub Actions cache. SCCACHE_GHA_ENABLED
      # is consumed by sccache itself; the action handles token plumbing.
      CC: sccache ${{ matrix.cc }}
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Expose GNU coreutils on PATH (macOS)
        if: runner.os == 'macOS'
        run: echo "/opt/homebrew/opt/coreutils/libexec/gnubin" >> "$GITHUB_PATH"

      # Pin sccache to v0.10.0 — the GHA cache backend requires >=0.10.0,
      # and pinning insulates CI from upstream breaking changes.
      - name: Set up sccache
        uses: Mozilla-Actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - name: Fetch libprism sources
        run: make deps

      # CI builds spinel_codegen for testing only — `-O3 -flto` adds
      # link time on every job (especially Windows) without buying us
      # anything CI cares about. LTO=0 keeps the local-dev default.
      - name: Build (parse + regexp + codegen)
        run: make -j$(getconf _NPROCESSORS_ONLN) LTO=0 all

      - name: Run tests
        # OPT=-O0 cuts cc time per test (each .rb compiles its own
        # generated C with $(CFLAGS) -Werror). Type-checking still
        # happens; we just skip the optimizer.
        # -j$(...) overlaps the per-test cc invocations.
        run: make -j$(getconf _NPROCESSORS_ONLN) test OPT=-O0

      - name: sccache stats
        if: always()
        run: sccache --show-stats

  windows-mingw:
    name: windows-mingw
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    env:
      # Wrap the compiler with sccache so per-.o compiles are cached
      # across runs via the GitHub Actions cache. SCCACHE_GHA_ENABLED
      # is consumed by sccache itself; the action handles token plumbing.
      CC: sccache gcc
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          # Reuse the pacman package set across runs — saves ~1m of
          # download/install on every job.
          cache: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-ruby
            make
            diffutils
            curl
            tar

      # Must come AFTER setup-msys2 so the action's env exports
      # (ACTIONS_RUNTIME_TOKEN, ACTIONS_RESULTS_URL, etc.) are visible
      # to subsequent steps. Pin to v0.10.0; the GHA cache backend
      # requires >=0.10.0.
      - name: Set up sccache
        uses: Mozilla-Actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      # The Mozilla action calls core.addPath() with a Windows-style
      # path, which the msys2 shell wrapper does NOT translate into its
      # POSIX PATH. Drop a symlink in /usr/bin so `sccache` resolves
      # inside the msys2 {0} shell.
      - name: Make sccache visible to MSYS2 shell
        run: ln -sf "$(cygpath -u "$SCCACHE_PATH")" /usr/bin/sccache

      - name: Show toolchain
        run: |
          uname -a
          gcc --version
          ruby --version
          make --version | head -1
          sccache --version

      - name: Fetch libprism sources
        run: make deps

      - name: Build (parse + regexp + codegen)
        run: make -j$(nproc) LTO=0 all

      - name: Run tests
        run: make -j$(nproc) test OPT=-O0

      - name: sccache stats
        if: always()
        run: sccache --show-stats
